# =============================================================================
# Docker Compose -- CareerLens
# =============================================================================
# Generated by /make-it scaffold (fastapi-nextjs)
#
# Usage:
#   docker compose --profile dev up --build
#
# Placeholders (replaced during /make-it build phase):
#   CareerLens          - human-readable app name
#   career-lens          - kebab-case app name (e.g., deliver-it)
#   3300     - host port for frontend (e.g., 3100)
#   8300      - host port for backend (e.g., 8100)
#   5600           - host port for PostgreSQL (e.g., 5500)
#   10190    - host port for mock-oidc (e.g., 10190)
#   [ADDITIONAL_SERVICE_URLS]    - extra env vars for integrations
#   [ADDITIONAL_MOCK_SERVICES]   - extra mock service definitions
# =============================================================================

services:
  # --------------------------------------------------------------------------
  # Frontend (Next.js)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3300:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Backend (FastAPI)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8300:8000"
    depends_on:
      db:
        condition: service_healthy
      mock-oidc:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://career-lens:career-lens@db:5432/career-lens
      - OIDC_ISSUER_URL=http://mock-oidc:10090
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-mock-oidc-client}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-mock-oidc-secret}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:3300
      - BACKEND_URL=http://localhost:8300
      - AI_PROVIDER=${AI_PROVIDER:-anthropic_foundry}
      - AI_MODEL_HEAVY=${AI_MODEL_HEAVY:-claude-opus-4-6}
      - AI_MODEL_STANDARD=${AI_MODEL_STANDARD:-claude-sonnet-4-6}
      - AI_MODEL_LIGHT=${AI_MODEL_LIGHT:-claude-haiku-4-5}
      - AZURE_AI_FOUNDRY_ENDPOINT=${AZURE_AI_FOUNDRY_ENDPOINT:-}
      - AZURE_AI_FOUNDRY_API_KEY=${AZURE_AI_FOUNDRY_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Database (PostgreSQL)
  # --------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    ports:
      - "5600:5432"
    environment:
      - POSTGRES_USER=career-lens
      - POSTGRES_PASSWORD=career-lens
      - POSTGRES_DB=career-lens
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career-lens"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Mock OIDC Provider (local dev only)
  # --------------------------------------------------------------------------
  mock-oidc:
    build:
      context: ./mock-services/mock-oidc
      dockerfile: Dockerfile
    ports:
      - "10190:10090"
    profiles:
      - dev
    environment:
      - MOCK_OIDC_PORT=10090
      - MOCK_OIDC_EXTERNAL_BASE_URL=http://localhost:10190
      - MOCK_OIDC_INTERNAL_BASE_URL=http://mock-oidc:10090
      - MOCK_OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-mock-oidc-client}
      - MOCK_OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-mock-oidc-secret}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10090/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  # [ADDITIONAL_MOCK_SERVICES]
  # --------------------------------------------------------------------------
  # Example: Mock Jira
  # --------------------------------------------------------------------------
  # mock-jira:
  #   build:
  #     context: ./mock-services/mock-jira
  #     dockerfile: Dockerfile
  #   ports:
  #     - "[MOCK_JIRA_PORT]:8443"
  #   profiles:
  #     - dev
  #   healthcheck:
  #     test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8443/health"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  #   networks:
  #     - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
