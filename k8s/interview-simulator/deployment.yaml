apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-simulator
  namespace: careerlens
  labels:
    app: interview-simulator
    component: simulator
    part-of: careerlens
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interview-simulator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: interview-simulator
        component: simulator
        part-of: careerlens
    spec:
      containers:
        - name: interview-simulator
          image: careerlensacr.azurecr.io/interview-simulator:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: careerlens-config
            - secretRef:
                name: careerlens-secrets
          env:
            - name: KOKORO_TTS_URL
              value: "http://kokoro-tts:8880"
            - name: WHISPER_STT_URL
              value: "http://whisper-stt:8000"
            - name: SERVICE_NAME
              value: "interview-simulator"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
