apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: careerlens-ingress
  namespace: careerlens
  labels:
    part-of: careerlens
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/request-timeout: "120"
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"
spec:
  tls:
    - hosts:
        - careerlens.example.com
      secretName: careerlens-tls
  rules:
    - host: careerlens.example.com
      http:
        paths:
          # Interview Simulator API (must come before generic /api)
          - path: /api/sim
            pathType: Prefix
            backend:
              service:
                name: interview-simulator
                port:
                  number: 8000

          # Main backend API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000

          # Frontend catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
